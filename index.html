<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实时投票系统</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@vikadata/vika@latest/dist/vika.umd.js"></script>
</head>
<body>
  <div class="container">
    <h1>实时投票系统</h1>
    
    <!-- 新增回答表单 -->
    <div class="section">
      <h2>新增回答</h2>
      <form id="add-form">
        <div class="form-group">
          <label for="user">用户名</label>
          <input type="text" id="user" name="user" required>
        </div>
        <div class="form-group">
          <label for="answer">回答内容</label>
          <textarea id="answer" name="answer" required></textarea>
        </div>
        <button type="submit">提交</button>
      </form>
      <p id="add-message"></p>
    </div>
    
    <!-- 投票记录列表 -->
    <div class="section">
      <h2>投票记录</h2>
      <table id="records-table">
        <thead>
          <tr>
            <th>用户名</th>
            <th>回答内容</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          <!-- 记录将通过 JavaScript 动态添加 -->
        </tbody>
      </table>
    </div>
    
    <!-- 修改回答表单 -->
    <div class="section" id="edit-section" style="display: none;">
      <h2>修改回答</h2>
      <form id="edit-form">
        <input type="hidden" id="edit-record-id">
        <div class="form-group">
          <label for="edit-user">用户名</label>
          <input type="text" id="edit-user" name="user" required>
        </div>
        <div class="form-group">
          <label for="edit-answer">回答内容</label>
          <textarea id="edit-answer" name="answer" required></textarea>
        </div>
        <button type="submit">保存修改</button>
        <button type="button" id="cancel-edit">取消</button>
      </form>
      <p id="edit-message"></p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
